<!DOCTYPE html>
<html>
<head>
    <title>Kaltum AI</title>

    <style>
    body {
        font-family: "Segoe UI", Arial, sans-serif;
        background: #0f172a;
        color: white;
        margin: 0;
    }

    .container {
        max-width: 700px;
        margin: auto;
        height: 100vh;
        display: flex;
        flex-direction: column;
    }

    .header {
        padding: 18px;
        font-size: 22px;
        text-align: center;
        background: #1e293b;
        font-weight: bold;
        border-bottom: 1px solid #334155;
    }

    #chatBox {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .message {
        max-width: 75%;
        padding: 12px 14px;
        border-radius: 14px;
        line-height: 1.5;
        animation: fadeIn 0.25s ease-in;
    }

    .user {
        background: #38bdf8;
        align-self: flex-end;
        color: black;
    }

    .bot {
        background: #334155;
        align-self: flex-start;
    }

    .time {
        font-size: 10px;
        opacity: 0.5;
        margin-top: 4px;
    }

    .input-area {
        display: flex;
        padding: 12px;
        background: #1e293b;
        border-top: 1px solid #334155;
    }

    input {
        flex: 1;
        padding: 12px;
        border: none;
        outline: none;
        border-radius: 8px;
        font-size: 14px;
    }

    button {
        padding: 12px 18px;
        background: #38bdf8;
        border: none;
        cursor: pointer;
        margin-left: 8px;
        border-radius: 8px;
        font-weight: bold;
    }

    button:hover {
        background: #0ea5e9;
    }

    button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .typing {
        opacity: 0.6;
        font-style: italic;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(6px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    </style>
</head>

<body>

<div class="container">
    <div class="header">🚀 Kaltum AI Assistant</div>
    <div id="chatBox"></div>

    <div class="input-area">
        <input id="userInput" placeholder="Type your message..." autofocus />
        <button id="sendBtn">Send</button>
    </div>
</div>

<script>
const API_URL = "https://kaltum-ai-agent.onrender.com/chat";

document.getElementById("sendBtn").addEventListener("click", sendMessage);
document.getElementById("userInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        e.preventDefault();
        sendMessage();
    }
});

async function sendMessage() {
    const inputField = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");

    const input = inputField.value.trim();
    if (!input) return;

    sendBtn.disabled = true;

    appendMessage(input, "user");
    inputField.value = "";
    inputField.focus();

    const typing = appendMessage("AI is typing...", "bot typing");
    scrollToBottom();

    try {
        const response = await fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ user_input: input })
        });

        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        typing.remove();

        appendMessage(
            data.response || "⚠️ No response from AI",
            "bot"
        );

    } catch (error) {
        typing.innerText = "🌐 Server waking up... try again";
        console.error("Error:", error);
    } finally {
        sendBtn.disabled = false;
        scrollToBottom();
    }
}

function appendMessage(text, className) {
    const chatBox = document.getElementById("chatBox");

    const msg = document.createElement("div");
    msg.className = `message ${className}`;

    // Safe text (prevents HTML injection)
    msg.textContent = text;

    const time = document.createElement("div");
    time.className = "time";
    time.textContent = new Date().toLocaleTimeString();

    msg.appendChild(time);
    chatBox.appendChild(msg);

    return msg;
}

function scrollToBottom() {
    const chatBox = document.getElementById("chatBox");
    chatBox.scrollTo({
        top: chatBox.scrollHeight,
        behavior: "smooth"
    });
}
</script>

</body>
</html>
