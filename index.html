<!DOCTYPE html>
<html>
<head>
    <title>Kaltum AI</title>

    <style>
    body {
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
        margin: 0;
    }

    .container {
        max-width: 600px;
        margin: auto;
        height: 100vh;
        display: flex;
        flex-direction: column;
    }

    .header {
        padding: 15px;
        font-size: 20px;
        text-align: center;
        background: #1e293b;
        font-weight: bold;
    }

    #chatBox {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        display: flex;
        flex-direction: column;
    }

    .message {
        margin: 10px 0;
        max-width: 80%;
        padding: 12px;
        border-radius: 12px;
        word-wrap: break-word;
        line-height: 1.5;
        animation: fadeIn 0.3s ease-in;
    }

    .user {
        background: #38bdf8;
        align-self: flex-end;
    }

    .bot {
        background: #334155;
        align-self: flex-start;
    }

    .input-area {
        display: flex;
        padding: 10px;
        background: #1e293b;
    }

    input {
        flex: 1;
        padding: 10px;
        border: none;
        outline: none;
        border-radius: 5px;
    }

    button {
        padding: 10px 15px;
        background: #38bdf8;
        border: none;
        cursor: pointer;
        margin-left: 5px;
        border-radius: 5px;
    }

    button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .typing {
        font-style: italic;
        opacity: 0.7;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    </style>
</head>

<body>

<div class="container">
    <div class="header">🚀 Kaltum AI Assistant</div>

    <div id="chatBox"></div>

    <div class="input-area">
        <input id="userInput" placeholder="Type your message..." />
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
const API_URL = "https://kaltum-ai-agent.onrender.com/chat";

async function sendMessage() {
    const inputField = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const chatBox = document.getElementById("chatBox");

    const input = inputField.value.trim();
    if (!input) return;

    // Disable button to prevent spam
    sendBtn.disabled = true;

    // USER MESSAGE
    appendMessage(input, "user");

    inputField.value = "";

    // TYPING INDICATOR
    const typing = appendMessage("AI is thinking...", "bot typing");

    scrollToBottom();

    try {
        const response = await fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ user_input: input })
        });

        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        typing.remove();

        appendMessage(
            data.response || "⚠️ No response from AI",
            "bot"
        );

    } catch (error) {
        typing.innerText = "❌ Server is waking up... try again in a few seconds";
        console.error("Error:", error);
    } finally {
        sendBtn.disabled = false;
        scrollToBottom();
    }
}

// Reusable message function
function appendMessage(text, className) {
    const chatBox = document.getElementById("chatBox");

    const msg = document.createElement("div");
    msg.className = `message ${className}`;
    msg.innerText = text;

    chatBox.appendChild(msg);
    return msg;
}

// Smooth scroll
function scrollToBottom() {
    const chatBox = document.getElementById("chatBox");
    chatBox.scrollTo({
        top: chatBox.scrollHeight,
        behavior: "smooth"
    });
}

// ENTER KEY SUPPORT
document.getElementById("userInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        e.preventDefault();
        sendMessage();
    }
});
</script>

</body>
</html>
